# Banco de dados PostgreSQL (producao) — configure via variaveis de ambiente na Render
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME:}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 desabilitado em producao
spring.h2.console.enabled=false

# JWT — obrigatorio em producao, sem fallback
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# CORS — defina a origem do seu frontend (ex: https://meu-app.vercel.app)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}
