# Nome da nossa aplicacao
spring.application.name=Cash-Flow

# 1. Configuracoes de conexao do Banco H2 (Banco em memoria)
spring.datasource.url=jdbc:h2:mem:cashflowdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# 2. Habilitar a interface web do H2 (para podermos ver as tabelas no navegador)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# 3. Configuracoes do JPA / Hibernate (A "magica" do banco)
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# O 'update' diz para o Spring: "Leia minhas classes Java e crie as tabelas automaticamente se elas nao existirem"
spring.jpa.hibernate.ddl-auto=update
# O 'true' faz o Spring imprimir no console do IntelliJ os comandos SQL que ele esta rodando por tras dos panos
spring.jpa.show-sql=true

# JWT — em prod, defina JWT_SECRET como variavel de ambiente
jwt.secret=${JWT_SECRET:cash-flow-super-secret-key-troque-em-producao-minimo-32chars!}
jwt.expiration=86400000

# CORS — em prod, defina CORS_ALLOWED_ORIGINS com a URL do frontend
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}
